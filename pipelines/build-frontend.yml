# Azure DevOps - Angular CI (best practice)
# - deterministic installs (npm ci)
# - caching npm package tarballs with Cache@2
# - use local Angular CLI via npx
# - publish artifact from Build.ArtifactStagingDirectory

trigger:
  branches:
    include:
      - master
  paths:
    include:
      - src/Organizer.SPA/*
    exclude:
      - pipelines/*

pool:
  vmImage: 'windows-latest'

variables:
  nodeVersion: '20.x'
  appDir: 'src/Organizer.SPA'
  buildConfig: 'production'
  # Artifact output folder (standard)
  artifactDir: '$(Build.ArtifactStagingDirectory)\dist'
  # npm cache folder (cache tarballs; safe with npm ci)
  npmCacheDir: '$(Pipeline.Workspace)\.npm'

steps:
- checkout: self
  fetchDepth: 1

- task: NodeTool@0
  displayName: 'Use Node.js $(nodeVersion)'
  inputs:
    versionSpec: '$(nodeVersion)'

# Cache npm package downloads to speed up npm ci
- task: Cache@2
  displayName: 'Cache npm (package tarballs)'
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)\$(appDir)\package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(npmCacheDir)'

# Deterministic install (preferred for CI)
- task: PowerShell@2
  displayName: 'Install dependencies (npm ci)'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"
      cd "$(Build.SourcesDirectory)\$(appDir)"

      # Point npm to the pipeline cache folder and prefer offline when possible
      npm config set cache "$(npmCacheDir)" --global
      npm ci --prefer-offline

# Build using local Angular CLI (npx) and modern flags
- task: PowerShell@2
  displayName: 'Build Angular'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"
      cd "$(Build.SourcesDirectory)\$(appDir)"

      # Helpful diagnostics
      node --version
      npm --version
      npx ng version

      # Ensure artifact output directory exists
      New-Item -ItemType Directory -Force -Path "$(artifactDir)" | Out-Null

      # --prod is deprecated/removed; use --configuration production
      # CLI uses dash-case: --output-path
      npx ng build --configuration="$(buildConfig)" --base-href ./ --output-path "$(artifactDir)"

# Publish pipeline artifact
- task: PublishPipelineArtifact@1
  displayName: 'Publish Artifact Organizer.SPA'
  inputs:
    targetPath: '$(artifactDir)'
    artifact: 'Organizer.SPA'
    publishLocation: 'pipeline'