trigger:
  branches:
    include:
      - master
  paths:
    include:
      - src/Organizer.SPA/*
    exclude:
      - pipelines/*

pool:
  vmImage: 'windows-latest'

variables:
  nodeVersion: '20.x'
  appDir: 'src/Organizer.SPA'
  ngProject: 'organizer'
  buildConfig: 'production'

  # npm cache (velocizza npm ci)
  npmCacheDir: '$(Pipeline.Workspace)\.npm'

  # dist reale (da angular.json)
  distDir: '$(Build.SourcesDirectory)\src\Organizer.SPA\dist\Organizer.SPA'

  # zip finale
  zipPath: '$(Build.ArtifactStagingDirectory)\Organizer.SPA.zip'

steps:
# checkout shallow
- checkout: self
  fetchDepth: 1

# Node.js
- task: NodeTool@0
  displayName: 'Use Node.js $(nodeVersion)'
  inputs:
    versionSpec: '$(nodeVersion)'

# Cache npm (tarball cache, safe con npm ci)
- task: Cache@2
  displayName: 'Cache npm'
  inputs:
    key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)\$(appDir)\package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: '$(npmCacheDir)'

# Install deps (deterministico)
- task: PowerShell@2
  displayName: 'Install dependencies (npm ci)'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"
      cd "$(Build.SourcesDirectory)\$(appDir)"

      node --version
      npm --version

      npm config set cache "$(npmCacheDir)" --global
      npm ci --prefer-offline

# Build Angular
- task: PowerShell@2
  displayName: 'Build Angular (organizer)'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"
      cd "$(Build.SourcesDirectory)\$(appDir)"

      npx ng version
      npx ng build "$(ngProject)" --configuration "$(buildConfig)" --base-href ./

# Verifica dist
- task: PowerShell@2
  displayName: 'Verify dist folder'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"
      if (!(Test-Path "$(distDir)")) {
        Write-Error "Dist folder not found: $(distDir)"
      }
      Write-Host "Dist folder OK"
      Get-ChildItem "$(distDir)"

# ✅ CREA ZIP (best practice per Release pipeline)
- task: ArchiveFiles@2
  displayName: 'Archive Angular dist to ZIP'
  inputs:
    rootFolderOrFile: '$(distDir)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(zipPath)'
    replaceExistingArchive: true

# ✅ Pubblica ZIP come artifact
- task: PublishPipelineArtifact@1
  displayName: 'Publish Artifact Organizer.SPA (ZIP)'
  inputs:
    targetPath: '$(zipPath)'
    artifact: 'Organizer.SPA'
    publishLocation: 'pipeline'